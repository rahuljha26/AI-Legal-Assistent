<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Helvetica', sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .header { background-color: #1D4ED8; color: white; padding: 15px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { padding: 20px; text-align: center; }
        .btn { display: inline-block; padding: 10px 20px; background-color: #1D4ED8; color: white; text-decoration: none; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Your Legal Document: {{ document_type }}</h2>
        </div>
        <div class="content">
            <p>We have successfully generated your legal document.</p>
            <p>Please find the PDF attached to this email.</p>
            <p style="font-size: 12px; color: #666; margin-top: 30px;">This document was automatically generated by AI Legal Assistant.</p>
        </div>
    </div>
</body>
</html>
