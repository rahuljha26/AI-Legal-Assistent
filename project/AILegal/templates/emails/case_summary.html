<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Helvetica', sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .header { background-color: #1D4ED8; color: white; padding: 15px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Case Summary</h2>
        </div>
        <div class="content">
            <p>Here is the summary of the case details:</p>
            <table>
                <tr><th>Client Name</th><td>{{ client_name }}</td></tr>
                <tr><th>Case Type</th><td>{{ case_type }}</td></tr>
                <tr><th>Status</th><td>{{ status }}</td></tr>
                <tr><th>Hearing Date</th><td>{{ hearing_date }}</td></tr>
                <tr><th>Description</th><td>{{ description }}</td></tr>
            </table>
        </div>
    </div>
</body>
</html>
