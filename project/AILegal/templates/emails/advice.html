<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Helvetica', sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .header { background-color: #1D4ED8; color: white; padding: 15px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { padding: 20px; }
        .disclaimer { font-size: 12px; color: #666; margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>AI Legal Assistant - Advice</h2>
        </div>
        <div class="content">
            <p><strong>Constitution/Law Reference:</strong> {{ constitution_reference }}</p>
            <h3>Recommended Steps:</h3>
            <ul>
                {% for step in steps %}
                <li>{{ step }}</li>
                {% endfor %}
            </ul>
        </div>
        <div class="disclaimer">
            <p>{{ disclaimer }}</p>
        </div>
    </div>
</body>
</html>
